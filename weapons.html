<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weapons Database</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="navbar">
    <h1 class="logo">PUBG<span>Guide</span></h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="weapons.html" class="active">Weapons</a>
      <a href="maps.html">Maps</a>
      <a href="loadouts.html">Loadouts</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero small-hero">
    <h2>Weapons Database</h2>
    <p>Search, filter and compare all weapons</p>
  </section>

  <!-- CONTROLS -->
  <section class="controls">
    <input id="searchInput" type="text" placeholder="Search weapon...">

    <select id="categoryFilter">
      <option value="all">All</option>
      <option value="AR">AR</option>
      <option value="SMG">SMG</option>
      <option value="SR">SR</option>
      <option value="DMR">DMR</option>
      <option value="Shotgun">Shotgun</option>
      <option value="LMG">LMG</option>
    </select>

    <select id="typeFilter">
  <option value="">All Types</option>
  <option value="melee">Melee</option>
  <option value="ranged">Ranged</option>
  <option value="explosive">Explosive</option>
</select>

  <!-- WEAPONS GRID -->
  <section class="content">
    <div id="weaponList" class="grid"></div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 PUBG Pro Guide | Built for Learning & Strategy</p>
  </footer>

  <script src="api.js"></script>
  <script src="app.js"></script>

</body>
</html>
